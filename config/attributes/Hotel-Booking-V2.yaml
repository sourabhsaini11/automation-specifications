meta:
  use_case_id: Hotel-Booking-V2
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The BAP includes this container in search to specify the country in which the location is situated.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: std:080
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The city location of the transaction, specified in search by the BAP to enable providers to filter and respond with city-relevant offers.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: Location where the transaction is intended to be fulfilled. BAP specifies it in search; BPP echoes it in on_search.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV13
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV10
              description: mobility domain Ride
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:TRV11
              description: mobility domain Public Transit
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16.000Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: ondc.hotelbap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: search
              description: Buyer app indicates the search intent
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://ondc.hotelbap.com/
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The BAP populates context in search with transaction metadata, demographic scope, platform identifiers, and protocol details that the BPP uses to route and process the search request.
        owner: BAP
        type: object
    message:
      intent:
        category:
          descriptor:
            code:
              _description:
                required: true
                usage: HOTEL
                info: Describes the category code for search's intent.
                owner: BAP
                type: enum
                enums:
                  - code: HOTEL
                    description: Describes the intent category to start search over network.
                    reference: <PR/Issue/Discussion Links md format text
            _description:
              required: true
              usage: ""
              info: BAP includes a descriptor to specify the service category being searched; the BPP validates the descriptor's code in on_search.
              owner: BAP
              type: object
          time:
            label:
              _description:
                required: false
                usage: AVAILABLE
                info: Describes the category code for search's intent.
                owner: BAP
                type: enum
                enums:
                  - code: AVAILABLE
                    description: Describes time's label for category
                    reference: <PR/Issue/Discussion Links md format text
            range:
              start:
                _description:
                  required: false
                  usage: 2023-12-25T00:00:00.000Z
                  info: Describes the category code for search's intent.
                  owner: BAP
                  type: string
              end:
                _description:
                  required: false
                  usage: 2023-12-27T00:00:00.000Z
                  info: Describes the category code for search's intent.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Object that encapsulates the start and end dates for the search time window; the BAP provides this temporal range to specify the period during which the requested items should be available.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: The time container specifies the temporal scope of the BAP's search—whether a single point in time, duration, or operational schedule.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The category object provided by the BAP in the search request, with a descriptor containing a code that identifies the service type. The value is persisted in the session and referenced across subsequent search steps.
            owner: BAP
            type: object
        fulfillment:
          stops:
            type:
              _description:
                required: false
                usage: END
                info: The type of stop. Allowed values of this property can be defined by the network policy.
                owner: BAP
                type: enum
                enums:
                  - code: START
                    description: Describes the initial fulfillment location.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: END
                    description: Describes the final fulfillment location.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: INTERMEDIATE_STOP
                    description: Describes the intermediate stops during fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TRANSIT_STOP
                    description: Describes the transit stops during fulfillment.
                    reference: <PR/Issue/Discussion Links md format text
            location:
              gps:
                _description:
                  required: false
                  usage: 12.827359, 77.691570
                  info: The BAP specifies latitude and longitude for each fulfillment stop location in search; these coordinates are persisted in the fulfillment intent and reused across later steps to maintain consistent location identification.
                  owner: BAP
                  type: string
              area_code:
                _description:
                  required: false
                  usage: "560100"
                  info: The BAP provides the postal area code for a fulfillment stop location to narrow the search intent to a specific geographic area; this value is anchored in the fulfillment structure and reused across subsequent steps of the transaction.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BAP specifies the location of a fulfillment stop in search to indicate where service is needed; this value is anchored in the fulfillment context and reused throughout the transaction.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Ordered list of logical stops the BAP specifies in the search intent to define the fulfillment path.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: The customer's fulfillment requirements that the BAP specifies during search; anchored in the session, this value is reused in subsequent transaction steps.
            owner: BAP
            type: object
        provider:
          time:
            label:
              _description:
                required: false
                usage: AVAILABLE
                info: Describes the category code for search's intent.
                owner: BAP
                type: string
            range:
              start:
                _description:
                  required: false
                  usage: 2023-12-25T00:00:00.000Z
                  info: Describes the category code for search's intent.
                  owner: BAP
                  type: string
              end:
                _description:
                  required: false
                  usage: 2023-12-27T00:00:00.000Z
                  info: Describes the category code for search's intent.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          id:
            _description:
              required: false
              usage: ondc-hotel-provider1
              info: Describes the provider id.
              owner: BAP
              type: string
          _description:
            required: false
            usage: --
            info: Describe the provider from which the customer wants to place to the order from
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: Container in which the BAP declares the consumer's search intent, enabling the BPP to identify matching products or services.
          owner: BAP
          type: object
        tags:
          descriptor:
            code:
              _description:
                required: true
                usage: BAP_TERMS
                info: The BAP assigns a descriptor code to each intent tag to classify the type of information it represents. The validator requires the BAP_TERMS code to be present, and these tags persist in the session for reuse in later steps.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: The classifier for each tag that identifies its semantic meaning or type (e.g., STATIC_TERMS, EFFECTIVE_DATE) so the BPP can interpret what category of criteria the BAP is applying to the search.
              owner: BAP
              type: object
          list:
            descriptor:
              code:
                _description:
                  required: true
                  usage: STATIC_TERMS
                  info: Type code for each search tag identifying what category of constraint it represents; the BAP specifies these to declare which constraint types (static terms, effective dates, fees, etc.) apply to the search, and they are retained in session for reuse in later operations.
                  owner: BAP
                  type: string
              _description:
                required: true
                usage: ""
                info: Filter descriptors the BAP specifies during search; persisted in session and reused across subsequent steps in the same conversation.
                owner: BAP
                type: object
            value:
              _description:
                required: true
                usage: https://static_terms.com
                info: Constraint value set by the BAP in the search request to refine the transaction intent. This value must be carried forward through subsequent steps to maintain alignment with the original search parameters.
                owner: BAP
                type: string
            _description:
              required: true
              usage: ""
              info: Tags the BAP includes in search to specify discovery criteria. BAP mints the tags in search and the BPP echoes them in on_search; the tags persist in session and are reused when the search request is replayed in select and init.
              owner: BAP
              type: object
          _description:
            required: true
            usage: ""
            info: The BAP includes tag attributes in the search intent to define search criteria; the array is preserved in session for downstream steps to reuse.
            owner: BAP
            type: object
      _description:
        required: true
        usage: ""
        info: The message object conveys the BAP's search request containing intent and query parameters that the BPP validates and processes to locate matching catalog items.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
  on_search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The BAP includes this container in search to specify the country in which the location is situated.
            owner: BPP
            type: object
        city:
          code:
            _description:
              required: true
              usage: std:080
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Bangalore
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The city location of the transaction, specified in search by the BAP to enable providers to filter and respond with city-relevant offers.
            owner: BPP
            type: object
        _description:
          required: true
          usage: ""
          info: Location where the transaction is intended to be fulfilled. BAP specifies it in search; BPP echoes it in on_search.
          owner: BPP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV13
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:TRV10
              description: mobility domain Ride
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:TRV11
              description: mobility domain Public Transit
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16.000Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: ondc.hotelbap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: on_search
              description: Seller app provides catalog based on search intent.
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://ondc.hotelbap.com/
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: " https://ondc.hotelbpp.com/"
          info: Describes subscriber URL of the BPP for accepting calls from BAPs.
          owner: BPP
          type: string
      bpp_id:
        _description:
          required: true
          usage: ondc.hotelbpp.com
          info: Describes subscriber ID of the BPP
          owner: BPP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The BAP populates context in search with transaction metadata, demographic scope, platform identifiers, and protocol details that the BPP uses to route and process the search request.
        owner: BPP
        type: object
    message:
      catalog:
        descriptor:
          name:
            _description:
              required: false
              usage: ONDC Hotel Groups
              info: Describes the catalogs name.
              owner: BPP
              type: string
          code:
            _description:
              required: false
              usage: BPP Code
              info: Describes the catalogs code.
              owner: BPP
              type: string
          short_desc:
            _description:
              required: false
              usage: Hotel BPP ONDC
              info: Describes the catalogs short description.
              owner: BPP
              type: string
          long_desc:
            _description:
              required: false
              usage: ONDC Hotel Groups is a Hotel Aggregator
              info: Describes the catalogs long description.
              owner: BPP
              type: string
          images:
            url:
              _description:
                required: false
                usage: https://remote-image.ondc.hotelbpp.com
                info: Describes the image URL for catalog.
                owner: BPP
                type: string
            _description:
              required: true
              usage: ""
              info: Array of images in the catalog descriptor that the BPP returns in the on_search response; the entire catalog including these images persists in session and is reused across the transaction.
              owner: BPP
              type: object
          _description:
            required: true
            usage: ""
            info: Physical description of the cataloged items; the BAP stores the entire catalog in the session and reuses it in downstream transaction steps.
            owner: BPP
            type: object
        providers:
          id:
            _description:
              required: true
              usage: P1
              info: Describes the unique id of provider
              owner: BPP
              type: string
          descriptor:
            name:
              _description:
                required: false
                usage: ONDC Hotel Provider ABC
                info: Describes the name of the provider.
                owner: BPP
                type: string
            short_desc:
              _description:
                required: false
                usage: Hotel ABC ONDC is a renowned hotel provider in India
                info: Describes the short description of the provider.
                owner: BPP
                type: string
            long_desc:
              _description:
                required: false
                usage: |-
                  All the hotels in ABC ONDC Hotel Provider are equipped with a variety
                                of on-site amenities
                info: Describes the long description of the provider.
                owner: BPP
                type: string
            images:
              url:
                _description:
                  required: false
                  usage: https://remote-image-ABC.ondc.hotelbpp.com
                  info: URL to the image. This can be a data url or an remote url
                  owner: BPP
                  type: string
              _description:
                required: true
                usage: ""
                info: Provider images included in the on_search catalog response. The catalog is persisted in session and reused across subsequent transaction steps.
                owner: BPP
                type: object
            _description:
              required: true
              usage: ""
              info: Each provider's descriptor holds identification and metadata in the on_search response. The BAP validates and stores the descriptor with the catalog for reuse across later transaction steps.
              owner: BPP
              type: object
            code:
              _description:
                required: true
                usage: Hotel
                info: BPP returns this code in the catalog to identify each provider type (e.g., Hotel); the catalog is persisted in session and retrieved in subsequent transaction steps.
                owner: BPP
                type: string
          locations:
            id:
              _description:
                required: false
                usage: L1
                info: Describes the serviceable location of the provider.
                owner: BPP
                type: string
            descriptor:
              name:
                _description:
                  required: false
                  usage: ONDC Hotel H1
                  info: Describes the name of location.
                  owner: BPP
                  type: string
              code:
                _description:
                  required: false
                  usage: Hotel:5
                  info: Describes the code of location.
                  owner: BPP
                  type: enum
                  enums:
                    - code: HOTEL:5
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: APARTMENT:2
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: RESORT:3
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: HOSTEL:5
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: HOUSEBOAT:1
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: ENTIRE_APARTMENT:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: FARM_STAY:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: CHALETS:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: TENT:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: VILLA:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: HOMESTAY:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: GUEST_HOUSE:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: TREE_HOUSE:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: CAMPSITE:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: LODGE:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: MOTELS:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: SERVICED_APARTMENT:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: BED_BREAKFAST:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: INN:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: OTHER:4
                      description: Describes the property type with star rating.
                      reference: <PR/Issue/Discussion Links md format text
              short_desc:
                _description:
                  required: false
                  usage: Hotel ABC ONDC is a renowned hotel in India
                  info: Describes the short description of location.
                  owner: BPP
                  type: string
              long_desc:
                _description:
                  required: false
                  usage: |-
                    ABC ONDC Hotel establishment is equipped with a variety of on-site
                     amenities
                  info: Describes the long description of location.
                  owner: BPP
                  type: string
              images:
                url:
                  _description:
                    required: false
                    usage: https://remote-image-H1-1.ondc.hotelbpp.com
                    info: URL to the image. This can be a data url or an remote url
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            gps:
              _description:
                required: true
                usage: 12.889849, 78.006663
                info: The BPP returns the GPS coordinates of each location in the on_search response. The catalog is stored in session and used across subsequent flow steps.
                owner: BPP
                type: string
            address:
              _description:
                required: false
                usage: M.Hosahalli
                info: Describes the address of the location.
                owner: BPP
                type: string
            city:
              name:
                _description:
                  required: false
                  usage: Bangalore
                  info: Describes the city's name of the location.
                  owner: BPP
                  type: string
              _description:
                required: true
                usage: ""
                info: Geographic location identifier for a provider within the catalog response, persisted in session and reused across the transaction.
                owner: BPP
                type: object
            state:
              name:
                _description:
                  required: false
                  usage: Karnataka
                  info: Describes the state's name of the location.
                  owner: BPP
                  type: string
              _description:
                required: true
                usage: ""
                info: The administrative state where a provider's location is situated, returned in the BPP's catalog to help the BAP identify and filter available providers by geographic jurisdiction.
                owner: BPP
                type: object
            area_code:
              _description:
                required: true
                usage: "563139"
                info: The BPP includes area_code as a location descriptor in the catalog response to identify the geographic service region. The catalog is persisted in session and reused across subsequent transaction steps.
                owner: BPP
                type: string
            _description:
              required: true
              usage: ""
              info: BPP specifies the locations where each provider in the catalog is available to service orders; each provider must have at least one location.
              owner: BPP
              type: object
            rating:
              _description:
                required: true
                usage: "5"
                info: Numeric rating of the location that indicates quality or customer satisfaction, provided by the BPP in on_search responses for the BAP to display to buyers.
                owner: BPP
                type: string
          payments:
            id:
              _description:
                required: false
                usage: pymnt-1
                info: Describes the payment ID.
                owner: BPP
                type: string
            type:
              _description:
                required: false
                usage: PRE-ORDER
                info: Describes the payment type.
                owner: BPP
                type: enum
                enums:
                  - code: PRE-ORDER
                    description: Payment occurs prior to order placement.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: ON-FULFILLMENT
                    description: Payment occurs upon completion of the journey.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: POST-FULFILLMENT
                    description: Payment occurs after the completion of the journey.
                    reference: <PR/Issue/Discussion Links md format text
                  - code: PART-PAYMENT
                    description: Describe the type of payment.
                    reference: <PR/Issue/Discussion Links md format text
            _description:
              required: true
              usage: ""
              info: The BPP declares the payment methods accepted by this provider; the array must be non-empty and is persisted in session for downstream steps.
              owner: BPP
              type: object
          items:
            id:
              _description:
                required: true
                usage: Accommodation-1
                info: Describes the item ID.
                owner: BPP
                type: string
            time:
              label:
                _description:
                  required: true
                  usage: ENABLE
