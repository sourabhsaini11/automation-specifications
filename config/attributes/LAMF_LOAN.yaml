meta:
  use_case_id: LAMF LOAN
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: |-
                It Explains the country code in accordance with the ISO 3166-1 and ISO 3166-2 formats and
                 
                 The ISO 3166-1 standard includes 249 countries, with 193 sovereign states as UN members. Dependent territories in ISO 3166-1 are often detailed as subdivisions in ISO 3166-2 under their administering state.
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The BAP specifies the country for this location-based search.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: This attribute describes the city code relevant to the location or the area in which it is situated.
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Represent the city code that identifies the cities. In case of '*' it will fetch all the cities where service is being provided.
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: ""
            info: The city location the BAP specifies to narrow the search to a particular geographic area.
            owner: BAP
            type: object
        _description:
          required: true
          usage: ""
          info: The location where the transaction is intended to be fulfilled.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS12
          info: This is the domain code relevant to the context of this transaction. Here, it is "ONDC:FIS12".
          owner: BAP
          type: enum
          enums:
            - code: ONDC:FIS12
              description: Updated domain namespace
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: |-
            It specifies the time of request generation in RFC3339 format. RFC3339 is a date and time format defined by the Internet Engineering Task Force (IETF) in the RFC 3339 standard.
             YYYY: Four-digit year
             MM: Two-digit month (01-12)
             DD: Two-digit day of the month (01-31)
             T: Separator between the date and time
             HH: Two-digit hour (00-23)
             MM: Two-digit minute (00-59)
             SS: Two-digit second (00-59)
             .sss: Fractional seconds (optional)
             Z: Indicates the time is in UTC (optional; the time may also include an offset)
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: bap.credit.becknprotocol.io
          info: This the subscriber ID of the BAP. It is the unique id for the buyer app.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: c751921f-ca28-4de5-b4e9-192cf3a38e43
          info: The BAP mints this unique identifier on search and carries it through every request and response until confirm. This value is anchored in session, enabling BPPs to track and personalize offerings across all steps despite not knowing the user.
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: |-
            This is a mandatory and unique identifier that persists consistently throughout a request/callback cycle.
             This value can be utilized to filter out and ignore duplicate messages coming from the BPP.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: It explains the transaction protocol version utilized by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: |-
            The sender initiates the Beckn protocol method, which is then carried out by the receiver.
             Beckn is an open, interoperable and universal transaction protocol to enable a decentralised digital economy.
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://bap.credit.becknprotocol.io/
          info: This is the subscriber URL of the Buyer App (BAP) is the endpoint that accepts callbacks from Seller App (BPPs).
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: |-
            Specifies the validity duration of this message in ISO8601 format, after timestamp.
             In the case of "PT30S," it represents a duration of 30 seconds. Here's a breakdown of the components:
             
             - "P" indicates the period.
             - "T" indicates the time part.
             - "30S" represents 30 seconds.
             
             So, "PT30S" signifies a duration of 30 seconds.
          owner: BAP
          type: string
      _description:
        required: true
        usage: ""
        info: The BAP generates context in search to establish transaction metadata—including consumer location, intent, and protocol details—that the BPP uses to understand and process the search request.
        owner: BAP
        type: object
      bpp_id:
        _description:
          required: false
          usage: bpp.credit.becknprotocol.org
          info: Subscriber ID of the BPP the BAP is searching. The BAP includes this to specify the target BPP, and the value is anchored in the session for reuse across all downstream steps.
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: false
          usage: https://bpp.credit.becknprotocol.org
          info: Subscriber URL of the BPP for accepting calls from BAPs. The BAP sets this in search to specify the target BPP, anchoring it in the session for reuse in later steps.
          owner: BAP
          type: string
