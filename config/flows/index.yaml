flows:
  - type: playground
    id: Buyer Side Full Cancellation
    usecase: Hotel-Booking-V2
    tags:
      - REPORTABLE
      - MANDATORY
      - WORKBENCH
    description: End-to-end hotel booking scenario where a buyer discovers accommodations, confirms a reservation, and subsequently initiates full cancellation of the booking.
    config:
      $ref: ./Hotel-Booking-V2/Buyer_Side_Full_Cancellation.yaml
  - type: playground
    id: Hotel Booking (ttl based) booking
    usecase: Hotel-Booking-V2
    tags:
      - REPORTABLE
      - MANDATORY
      - WORKBENCH
    description: Validates hotel booking transactions with TTL-based incremental catalog refresh to ensure inventory accuracy and consistency across sequential searches. Tests the system's ability to maintain up-to-date availability and pricing information through time-to-live controlled refresh cycles.
    config:
      $ref: ./Hotel-Booking-V2/Hotel_Booking__ttl_based__booking.yaml
  - type: playground
    id: Hotel Booking Seller App Pagination Flow
    usecase: Hotel-Booking-V2
    tags:
      - REPORTABLE
      - MANDATORY
      - WORKBENCH
    description: A hotel buyer searches for available properties and the seller app responds with paginated results across multiple search responses to efficiently handle large inventory sets.
    config:
      $ref: ./Hotel-Booking-V2/Hotel_Booking_Seller_App_Pagination_Flow.yaml
  - type: playground
    id: Merchant Side Full Cancellation
    usecase: Hotel-Booking-V2
    tags:
      - REPORTABLE
      - MANDATORY
      - WORKBENCH
    description: End-to-end hotel booking transaction from search through booking confirmation, followed by merchant-initiated cancellation of the entire reservation.
    config:
      $ref: ./Hotel-Booking-V2/Merchant_Side_Full_Cancellation.yaml
  - type: playground
    id: Order to Confirm to Fulfillment (City Code)
    usecase: Hotel-Booking-V2
    tags:
      - REPORTABLE
      - MANDATORY
      - WORKBENCH
    description: Complete hotel booking journey enabling customers to search location-based accommodations, select and confirm reservations, and monitor fulfillment status across the transaction lifecycle.
    config:
      $ref: ./Hotel-Booking-V2/Order_to_Confirm_to_Fulfillment__City_Code_.yaml
  - type: playground
    id: Order to Confirm to Fulfillment (Updates in Booking)
    usecase: Hotel-Booking-V2
    tags:
      - REPORTABLE
      - OPTIONAL
      - WORKBENCH
    description: A complete hotel booking flow that guides guests through searching and selecting properties, confirming reservations, and managing post-confirmation modifications to their bookings.
    config:
      $ref: ./Hotel-Booking-V2/Order_to_Confirm_to_Fulfillment__Updates_in_Booking_.yaml
